<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Page</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #1a1a1a, #000);
      font-family: 'Poppins', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Glowing Welcome Text */
    .welcome {
      font-size: 3.5rem;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(45deg, #ff00ff, #00ffff, #ff7f50);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glowText 2.5s ease-in-out infinite alternate;
      margin-bottom: 60px;
    }

    @keyframes glowText {
      0% { filter: drop-shadow(0 0 5px #ff00ff) drop-shadow(0 0 10px #00ffff); }
      50% { filter: drop-shadow(0 0 20px #ff00ff) drop-shadow(0 0 25px #00ffff); }
      100% { filter: drop-shadow(0 0 10px #ff7f50) drop-shadow(0 0 20px #00ffff); }
    }

    /* Buttons container at the bottom */
    .btn-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      position: absolute;
      bottom: 40px;
      width: 100%;
      padding: 0 20px;
    }

    .btn {
      position: relative;
      padding: 15px 45px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ff00ff, #00ffff);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffff;
    }

    /* Floating glow animation for buttons text */
    .btn span {
      display: inline-block;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 5px #ff00ff, 0 0 10px #00ffff; }
      50% { text-shadow: 0 0 15px #ff00ff, 0 0 20px #00ffff; }
      100% { text-shadow: 0 0 10px #ff7f50, 0 0 15px #00ffff; }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .welcome {
        font-size: 2.2rem;
        margin-bottom: 40px;
      }
      .btn {
        padding: 12px 35px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="welcome">Welcome to Your Amazing Journey!</div>

  <div class="btn-container">
    <a href="/signin" class="btn"><span>Sign In</span></a>
    <a href="/signup" class="btn"><span>Sign Up</span></a>
  </div>

</body>
</html>

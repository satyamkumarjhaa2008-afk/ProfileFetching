<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile Search</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    h1 {
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .search-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    input {
      padding: 10px 15px;
      font-size: 16px;
      border-radius: 25px;
      border: none;
      outline: none;
      width: 250px;
      transition: 0.3s;
    }

    input:focus {
      box-shadow: 0 0 10px #fff;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #ff7e5f;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #feb47b;
      transform: scale(1.05);
    }

    .profile-card {
      display: none;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      width: 320px;
      text-align: center;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile-pic {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(45deg, #ff9a9e, #fad0c4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 20px;
      color: #333;
      font-weight: bold;
    }

    .profile-details p {
      margin: 5px 0;
      font-size: 15px;
    }

    .highlight {
      color: #ffd369;
      font-weight: 600;
    }

    /* 🌐 Loader Spinner */
    .loader {
      display: none;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid #ffd369;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 🧠 Status messages */
    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #ffd369;
      font-style: italic;
      text-align: center;
      height: 20px;
    }
  </style>
</head>
<body>
  <h1>🔍 Search User Profile</h1>
  <div class="search-container">
    <input type="text" id="userIdInput" placeholder="Enter User ID..." />
    <button onclick="searchProfile()" id="Search">Search</button>
  </div>

  <div class="loader" id="loader"></div>
  <div class="status" id="status"></div>

  <div class="profile-card" id="profileCard">
   <div class="profile-pic">
  <img src="" id="profilePic" alt="User photo" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">
</div>

 
    <div class="profile-details" id="profileDetails"></div>
  </div>

  <script>
    const saveBtn = document.getElementById('Search');
    const loader = document.getElementById('loader');
    const statusText = document.getElementById('status');
      let pic = document.getElementById("profileCard").querySelector("img");
    let realProfile;
    let binaryData;

    async function searchProfile() {
      const userId = document.getElementById('userIdInput').value.trim();
      const card = document.getElementById("profileCard");
      const details = document.getElementById("profileDetails");

      if (!userId) {
        alert("Please enter a User ID!");
        return;
      }

      // Reset UI
      realProfile = null;
      card.style.display = "none";
      details.innerHTML = "";
      loader.style.display = "block";
      statusText.textContent = "🔄 Fetching data from server...";

      try {
        // Simulate progress stages
        await new Promise(resolve => setTimeout(resolve, 500));
        statusText.textContent = "📡 Sending User ID to server...";

        const formData = new FormData();
        formData.append("Id", userId);

        const response = await fetch('/getProfile', {
          method: 'POST',
          body: formData
        });
        

        statusText.textContent = "🧠 Fetching data from database...";

        const data = await response.json();
        realProfile = data;
binaryData = realProfile.picture.data
console.log(binaryData)

//  pic = `data:${realProfile.picture.contentType};base64,${binaryData}`
        await new Promise(resolve => setTimeout(resolve, 500));

        loader.style.display = "none";

        if (realProfile && Object.keys(realProfile).length > 0) {
          statusText.textContent = "✅ Profile found!";
          // pic.textContent = realProfile.firstName
          //   ? realProfile.firstName.charAt(0).toUpperCase()
          //   : "U";

//This is converting base64 into actual img and img url 
pic.src = `data:${realProfile.picture.contentType};base64,${binaryData}`




          details.innerHTML = `
            <p><span class="highlight">Full Name:</span> ${realProfile.fullName}</p>
            <p><span class="highlight">Date of Birth:</span> ${realProfile.dateOfBirth}</p>
            <p><span class="highlight">Gender:</span> ${realProfile.gender}</p>
            <p><span class="highlight">Nationality:</span> ${realProfile.nationality}</p>
          `;
          card.style.display = "flex";
        } else {
          statusText.textContent = "❌ No profile found for this User ID!";
        }

      } catch (error) {
        console.error("Error:", error);
        loader.style.display = "none";
        statusText.textContent = "⚠️ Server error. Try again!";
      }
    }
  </script>
</body>
</html>
